<!DOCTYPE html>
<!-- تخبر المتصفح أن هذا ملف HTML -->

<html lang="en">
<!-- بداية الصفحة ولغتها إنجليزية -->

   <head>

    <meta charset="UTF-8">
    <!-- meta = وسم معلومات لا يظهر للمستخدم -->
    <!-- charset = نوع الحروف المستخدمة -->
    <!-- UTF-8 = يدعم كل حروف العالم -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport = يتحدث عن حجم الشاشة -->
    <!-- width=device-width = عرض الصفحة يساوي عرض الشاشة -->
    <!-- initial-scale=1.0 = اعرض بالحجم الطبيعي -->

    <title>PX8</title>
    <!-- title = اسم الموقع الذي يظهر في تبويب المتصفح -->

     <link rel="preconnect" href="https://fonts.googleapis.com">
<!-- link = ربط مصدر خارجي -->
<!-- rel="preconnect" = اتصل بخادم Google Fonts مسبقاً لتسريع التحميل -->
<!-- href = رابط خادم Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<!-- href = رابط خط Inter -->
<!-- rel="stylesheet" = هذا ملف تصميم -->

<link rel="stylesheet" href="css/style.css">
<!-- link = ربط ملف خارجي -->
<!-- rel="stylesheet" = هذا ملف تصميم CSS -->
<!-- href = اذهب إلى مجلد css وافتح ملف style.css -->

</head>

    <body>
    <!-- كل ما سيظهر للمستخدم -->

   
    <header>
    <!-- header = الشريط الذي يظهر في أعلى كل صفحة -->
    <!-- يحتوي على الشعار وشريط البحث وأيقونة السلة -->
     <h1>PX8 Gym Tracker</h1>
    <!-- h1 = أكبر عنوان في الصفحة -->
    <!-- PX8 Gym Tracker = النص الذي سيظهر للمستخدم -->
    </header>

     <main>
    <!-- main = القسم الرئيسي الذي يحتوي على محتوى الصفحة -->
    <!-- يحتوي على المنتجات والعروض والتصنيفات -->
     
     <p>Track your workouts</p>
    <!-- p = فقرة نصية عادية -->
    <!-- Track your workouts = وصف المتجر -->

  <section class="muscles-grid">
    <!-- section = قسم مستقل داخل الصفحة -->
    <!-- class = اسم نعطيه للقسم لنتحكم به لاحقاً في CSS -->
    <!-- muscles-grid = اسم الكلاس الذي سيرتب العضلات في شبكة -->

     <h2>Select Muscle</h2>

    <div class="muscle-card">
    <!-- div = صندوق يحتوي على عضلة واحدة -->
    <!-- class="muscle-card" = اسم الكلاس لتنسيقه لاحقاً في CSS -->
        <p>Back</p>
        <!-- p = اسم العضلة -->
    </div>

    <div class="muscle-card">
        <p>Biceps</p>
    </div>

    <div class="muscle-card">
        <p>Chest</p>
    </div>

    <div class="muscle-card">
        <p>Triceps</p>
    </div>

    <div class="muscle-card">
        <p>Forearms</p>
    </div>

    <div class="muscle-card">
        <p>Shoulders</p>
    </div>

    <div class="muscle-card">
        <p>Legs</p>
    </div>

    <div class="muscle-card">
        <p>Abs</p>
    </div>

        

</section>

    </main>

     <footer>
    <!-- footer = الشريط الذي يظهر في أسفل كل صفحة -->
    <!-- يحتوي على معلومات التواصل وروابط مهمة -->
    </footer>


    </body>

</html>
<!-- نهاية الصفحة -->
