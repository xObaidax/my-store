<!DOCTYPE html>
<!-- تخبر المتصفح أن هذا ملف HTML -->

<html lang="en">
<!-- بداية الصفحة ولغتها إنجليزية -->

   <head>

    <meta charset="UTF-8">
    <!-- meta = وسم معلومات لا يظهر للمستخدم -->
    <!-- charset = نوع الحروف المستخدمة -->
    <!-- UTF-8 = يدعم كل حروف العالم -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport = يتحدث عن حجم الشاشة -->
    <!-- width=device-width = عرض الصفحة يساوي عرض الشاشة -->
    <!-- initial-scale=1.0 = اعرض بالحجم الطبيعي -->

    <title>Obaida Store</title>
    <!-- title = اسم الموقع الذي يظهر في تبويب المتصفح -->

</head>

    <body>
    <!-- كل ما سيظهر للمستخدم -->

       <h1>Welcome to Obaida Store</h1>
    <!-- h1 = أكبر عنوان في الصفحة -->
    <!-- Welcome to Obaida Store = النص الذي سيظهر للمستخدم -->

   <p>The best supplements store</p>
    <!-- p = فقرة نصية عادية -->
    <!-- The best supplements store = وصف المتجر -->



    </body>

</html>
<!-- نهاية الصفحة -->
