    <!-- width=device-width = اجعل عرض الصفحة يساوي عرض الشاشة -->

    <!-- href = ارجع خطوة للخلف ثم اذهب إلى مجلد css -->

</head>

    <!-- header = الشريط العلوي للصفحة -->

        <!-- href="../index.html" = ارجع للصفحة الرئيسية -->
        <!-- ← Home = نص الرابط الذي سيظهر للمستخدم -->

        <h1>legs</h1>
        <!-- h1 = اسم العضلة -->
